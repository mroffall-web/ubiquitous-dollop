<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Data Table</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        /* Removes all margins and padding from the page */
        body, html { margin: 0; padding: 0; font-family: sans-serif; height: 100%; width: 100%; }
        #table-container { width: 100%; height: 100%; overflow: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; border-top: none; }
        th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; white-space: nowrap; }
        /* Keeps the top row visible while scrolling */
        th { background-color: #f4f4f4; position: sticky; top: 0; z-index: 1; border-top: none; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>
    <div id="table-container"></div>

    <script>
        function loadData() {
            const csvFile = "Cypress_TX_-_Bridgeland_Plum_Creek_4-29-25_WxData.csv";

            Papa.parse(csvFile, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        let html = '<table><thead><tr>';
                        Object.keys(results.data[0]).forEach(key => html += `<th>${key}</th>`);
                        html += '</tr></thead><tbody>';
                        results.data.forEach(row => {
                            html += '<tr>';
                            Object.values(row).forEach(val => html += `<td>${val || ''}</td>`);
                            html += '</tr>';
                        });
                        html += '</tbody></table>';
                        document.getElementById('table-container').innerHTML = html;
                    }
                }
            });
        }

        window.onload = function() {
            if (typeof Papa !== 'undefined') {
                loadData();
            }
        };
    </script>
</body>
</html>
