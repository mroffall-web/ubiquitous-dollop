<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Data Table</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; background: #fff; }
        #table-container { width: 100%; height: 100vh; overflow: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; white-space: nowrap; }
        th { background-color: #f4f4f4; position: sticky; top: 0; z-index: 10; }
        tr:nth-child(even) { background-color: #fafafa; }
        .status { padding: 20px; font-weight: bold; color: #666; }
        .error { color: red; padding: 20px; border: 1px solid red; margin: 10px; }
    </style>
</head>
<body>
    <div id="table-container"><div class="status" id="status-msg">Searching for CSV file...</div></div>

    <script>
        // STEP 1: Put your exact filename here (Case Sensitive!)
        const filename = "Cypress_TX_-_Bridgeland_Plum_Creek_4-29-25_WxData.csv";

        async function loadCSV() {
            const status = document.getElementById('status-msg');
            try {
                const response = await fetch(filename);
                if (!response.ok) throw new Error(`Could not find file: ${filename}`);
                
                const text = await response.text();
                const rows = text.split('\n').map(row => row.split(','));
                
                if (rows.length < 1) throw new Error("File is empty.");

                let html = '<table><thead><tr>';
                // Build Headers
                rows[0].forEach(header => html += `<th>${header.trim()}</th>`);
                html += '</tr></thead><tbody>';
                // Build Rows (starting from index 1)
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].length < rows[0].length) continue; // Skip empty rows
                    html += '<tr>';
                    rows[i].forEach(cell => html += `<td>${cell.trim()}</td>`);
                    html += '</tr>';
                }
                html += '</tbody></table>';
                
                document.getElementById('table-container').innerHTML = html;
            } catch (err) {
                document.getElementById('table-container').innerHTML = `<div class="error">
                    <b>ERROR:</b> ${err.message}<br><br>
                    1. Check that the file is in your GitHub main folder.<br>
                    2. Ensure it is named exactly <b>${filename}</b>.
                </div>`;
            }
        }

        loadCSV();
    </script>
</body>
</html>
