<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Data - Raw CSV</title>
    <style>
        /* This style preserves the "spreadsheet" look using plain text */
        body, html { margin: 0; padding: 0; background: #fff; height: 100%; }
        #raw-output {
            white-space: pre; /* Keeps columns and rows as they are in the file */
            font-family: monospace; 
            font-size: 12px;
            padding: 15px;
            overflow: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div id="raw-output">Loading data...</div>

    <script>
        const filename = "Cypress_TX_-_Bridgeland_Plum_Creek_4-29-25_WxData.csv";

        async function loadRawText() {
            try {
                const response = await fetch(filename);
                if (!response.ok) throw new Error("Could not find file.");
                
                const text = await response.text();
                // Puts the raw CSV text directly on the screen
                document.getElementById('raw-output').textContent = text;
            } catch (err) {
                document.getElementById('raw-output').textContent = "Error: " + err.message;
            }
        }

        loadRawText();
    </script>
</body>
</html>
